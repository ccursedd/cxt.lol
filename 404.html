<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cxt — profile + dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#000;--fg:#fff;--muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.08);--panel:rgba(255,255,255,0.04);--accent:#ffffff;}
    body{background:radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.04) 0%, transparent 60%),var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;transition:background 0.4s;}
    #bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
    #enter-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer;transition:opacity 0.7s ease;}
    #enter-screen.fade-out{opacity:0;pointer-events:none;}
    .enter-label{font-size:1.1rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.8);animation:labelPulse 2.5s ease-in-out infinite;user-select:none;}
    @keyframes labelPulse{0%,100%{opacity:0.6;}50%{opacity:1;}}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;opacity:0;transition:opacity 0.7s ease 0.3s;}
    .page.visible{opacity:1;}
    .card{width:100%;max-width:460px;}
    .card.animate-in{animation:cardIn 0.8s cubic-bezier(0.23,1,0.32,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
    .banner{width:100%;height:80px;border-radius:18px 18px 0 0;background:rgba(255,255,255,0.04);overflow:hidden;display:none;}
    .banner.has-banner{display:block;}
    .banner img{width:100%;height:100%;object-fit:cover;opacity:0.7;}
    .avatar-area{display:flex;flex-direction:column;align-items:center;padding-bottom:1.5rem;}
    .avatar-wrap{position:relative;display:inline-block;margin-top:1.5rem;}
    .avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.1);display:block;background:rgba(255,255,255,0.06);}
    .avatar-decoration{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1.2);width:96px;height:96px;pointer-events:none;z-index:3;object-fit:contain;}
    .username{font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin-top:0.9rem;}
    .bio{font-size:0.82rem;color:var(--muted);margin-top:0.5rem;text-align:center;max-width:300px;line-height:1.6;}
    .widgets{display:flex;flex-direction:column;gap:0.65rem;}
    .panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:background 0.22s,border-color 0.22s,transform 0.22s;}
    .panel:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.13);transform:translateY(-1px);}
    .discord-widget{padding:0.8rem 1rem;display:flex;align-items:center;gap:0.8rem;text-decoration:none;color:inherit;cursor:pointer;}
    .discord-pfp{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);flex-shrink:0;position:relative;}
    .discord-pfp img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .status-dot{position:absolute;bottom:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:#747f8d;border:2.5px solid #000;z-index:2;}
    .status-dot.offline{background:#747f8d;}.status-dot.online{background:#3ba55c;}.status-dot.dnd{background:#ed4245;}.status-dot.idle{background:#faa81a;}
    .discord-handle{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.9);}
    .discord-handle span{color:rgba(255,255,255,0.35);font-weight:400;}
    .discord-icon{opacity:0.2;flex-shrink:0;margin-left:auto;}
    .socials-grid{padding:0.8rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:0.5rem;}
    .social-pill{display:flex;align-items:center;gap:0.45rem;padding:0.5rem 0.7rem;border:1px solid rgba(255,255,255,0.07);border-radius:10px;background:rgba(255,255,255,0.03);text-decoration:none;color:rgba(255,255,255,0.6);font-size:0.72rem;font-weight:500;transition:all 0.2s;cursor:pointer;}
    .social-pill:hover{background:rgba(255,255,255,0.07);color:var(--fg);border-color:rgba(255,255,255,0.15);}
    .social-pill svg{opacity:0.5;flex-shrink:0;}
    .audio-player{padding:0.9rem 1rem 0.7rem;}
    .audio-track-info{margin-bottom:0.7rem;}
    .audio-track-name{font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .audio-track-artist{font-size:0.72rem;color:var(--muted);}
    .waveform{display:flex;align-items:center;gap:2.5px;height:32px;margin-bottom:0.65rem;}
    .wbar{flex:1;border-radius:2px;background:rgba(255,255,255,0.7);min-height:2px;}
    .prog-bg{height:3px;background:rgba(255,255,255,0.1);border-radius:99px;cursor:pointer;position:relative;}
    .prog-fill{height:100%;background:rgba(255,255,255,0.6);border-radius:99px;width:0%;pointer-events:none;}
    .times{display:flex;justify-content:space-between;font-size:0.62rem;color:rgba(255,255,255,0.28);margin-top:4px;}
    .vol-row{display:flex;align-items:center;gap:0.55rem;margin-top:0.7rem;padding-top:0.65rem;border-top:1px solid rgba(255,255,255,0.05);}
    .vol-icon{opacity:0.22;flex-shrink:0;}
    input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,0.6);cursor:pointer;}
    .page-footer{text-align:center;margin-top:1.2rem;font-size:0.65rem;color:rgba(255,255,255,0.15);}
    .page-footer a{color:inherit;text-decoration:none;}
    .page-footer a:hover{color:rgba(255,255,255,0.4);}
    #not-found{display:none;position:fixed;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:50;}
    #not-found.show{display:flex;}
    #not-found h1{font-size:3rem;font-weight:900;opacity:0.2;}
    #not-found p{color:var(--muted);font-size:0.85rem;}
    #not-found a{color:#000;font-size:0.8rem;background:var(--fg);border:1px solid var(--border);padding:0.4rem 0.9rem;border-radius:8px;text-decoration:none;}
    .staff-badge{display:inline-block;font-size:0.55rem;font-weight:700;letter-spacing:0.08em;padding:0.15rem 0.45rem;border-radius:6px;background:var(--fg);color:var(--bg);vertical-align:middle;margin-left:0.5rem;}
    /* text effects */
    .glitch{color:var(--fg);text-shadow:0 0 10px rgba(255,255,255,0.4);position:relative;}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;}
    .glitch::before{animation:glitch-r 0.5s infinite linear alternate-reverse;clip-path:polygon(0 0,100% 0,100% 45%,0 45%);opacity:0.8;}
    .glitch::after{animation:glitch-r 0.75s infinite linear alternate-reverse;clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%);opacity:0.7;}
    @keyframes glitch-r{0%{transform:translateX(-8px)}20%{transform:translateX(14px)}35%{transform:translateX(-6px)}50%{transform:translateX(10px)}65%{transform:translateX(-4px)}80%{transform:translateX(8px)}100%{transform:translateX(-3px)}}
    .glitch{animation:glitch-main 2s infinite;}
    @keyframes glitch-main{0%,92%,100%{transform:translateX(0) skew(0deg);opacity:1}5%{transform:translateX(-4px) skew(3deg)}12%{transform:translateX(6px) skew(-4deg)}18%{transform:translateX(-3px)}25%{transform:translateX(8px) skew(2deg)}40%{transform:translateX(0)}65%{transform:translateX(-7px)}78%{transform:translateX(4px)}88%{opacity:0.7}}
    @keyframes glitch-burst{0%,85%,100%{filter:brightness(1)}86%{filter:brightness(2.5);transform:translateX(18px)}87%{transform:translateX(-22px)}88%{transform:translateX(8px)}89%{filter:brightness(1)}}
    .glitch.burst{animation:glitch-main 2s infinite,glitch-burst 4s infinite;}
    .chroma-text{background:linear-gradient(90deg,#ffffff 0%,#ff00ff 10%,#00ffff 20%,#ffff00 30%,#00ff00 40%,#ff8800 50%,#ff00ff 60%,#00ffff 70%,#ffff00 80%,#ffffff 100%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:chromaSweep 4s linear infinite;text-shadow:0 0 20px rgba(255,255,255,0.5),0 0 40px rgba(255,255,255,0.3);position:relative;}
    @keyframes chromaSweep{0%{background-position:0% 50%}100%{background-position:300% 50%}}
    .chroma-text::before{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,0.4) 50%,transparent 70%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 1.5s linear infinite;pointer-events:none;mix-blend-mode:screen;}
    @keyframes shimmer{0%{background-position:200% 50%}100%{background-position:-200% 50%}}
    .neon{color:#fff;text-shadow:0 0 7px #fff,0 0 10px #fff,0 0 21px #fff,0 0 42px #0fa,0 0 82px #0fa,0 0 92px #0fa,0 0 102px #0fa,0 0 151px #0fa;}
    .fire{background:linear-gradient(180deg,#ff4500 0%,#ff8c00 30%,#ffd700 60%,#ff4500 100%);background-size:100% 200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:fireRise 1.5s ease-in-out infinite alternate;text-shadow:0 0 20px rgba(255,69,0,0.8),0 0 40px rgba(255,140,0,0.5);}
    @keyframes fireRise{0%{background-position:0% 100%}100%{background-position:0% 0%}}
    .frost{color:rgba(255,255,255,0.85);text-shadow:0 0 10px rgba(255,255,255,0.3);background:linear-gradient(135deg,rgba(255,255,255,0.4) 0%,rgba(200,230,255,0.1) 50%,rgba(255,255,255,0.3) 100%);-webkit-background-clip:text;background-clip:text;}
    .retro{background:linear-gradient(135deg,#ff6ec7 0%,#ff6ec7 25%,#7b68ee 50%,#00d4ff 75%,#ff6ec7 100%);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:retroShift 4s ease-in-out infinite;text-shadow:0 0 10px rgba(255,110,199,0.5),4px 4px 0 rgba(123,104,238,0.3);}
    @keyframes retroShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .matrix{color:#00ff41;text-shadow:0 0 5px #00ff41,0 0 10px #00ff41,0 0 20px #00ff41,0 0 40px #00ff41;}
    .matrix::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.05) 2px,rgba(0,255,65,0.05) 4px);pointer-events:none;}
    .hologram{background:linear-gradient(135deg,#ff00ff 0%,#00ffff 25%,#ffff00 50%,#ff00ff 75%,#00ffff 100%);background-size:400% 400%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:hologramShift 3s ease infinite;text-shadow:0 0 20px rgba(255,0,255,0.3),0 0 40px rgba(0,255,255,0.2);}
    @keyframes hologramShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .outline{color:transparent;-webkit-text-stroke:2px var(--fg);text-shadow:none;}
    .three-d{color:var(--fg);text-shadow:1px 1px 0 rgba(0,0,0,0.3),2px 2px 0 rgba(0,0,0,0.3),3px 3px 0 rgba(0,0,0,0.3),4px 4px 0 rgba(0,0,0,0.3),5px 5px 0 rgba(0,0,0,0.3),6px 6px 0 rgba(0,0,0,0.2);}
    .neon-flicker{color:#fff;text-shadow:0 0 7px #fff,0 0 10px #fff,0 0 21px #fff,0 0 42px #f09,0 0 82px #f09,0 0 92px #f09;animation:flicker 3s infinite;}
    @keyframes flicker{0%,100%{opacity:1}5%{opacity:0.8}10%{opacity:1}15%{opacity:0.3}20%{opacity:1}50%{opacity:0.95}53%{opacity:0.2}56%{opacity:1}80%{opacity:0.9}83%{opacity:0.4}86%{opacity:1}}
    .aurora{background:linear-gradient(135deg,#00ff87 0%,#60efff 30%,#0066ff 60%,#00ff87 100%);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:auroraShift 6s ease-in-out infinite;text-shadow:0 0 30px rgba(0,255,135,0.4);}
    @keyframes auroraShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .shadow-pulse{color:var(--fg);animation:shadowPulse 2s ease-in-out infinite;}
    @keyframes shadowPulse{0%,100%{text-shadow:0 0 10px var(--fg),0 0 20px var(--fg)}50%{text-shadow:0 0 30px var(--fg),0 0 60px var(--fg),0 0 80px var(--fg)}}
    .gradient-slide{background:linear-gradient(90deg,var(--fg),#ff00ff,var(--fg));background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradSlide 3s linear infinite;}
    @keyframes gradSlide{0%{background-position:0% 50%}100%{background-position:300% 50%}}
    /* dashboard styles (minimal, modern) */
    .dash-toggle{position:fixed;bottom:20px;right:20px;z-index:200;background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:30px;padding:8px 16px;font-size:0.7rem;color:var(--muted);cursor:pointer;transition:0.2s;font-family:inherit;}
    .dash-toggle:hover{background:rgba(255,255,255,0.1);color:var(--fg);}
    .dash-panel{position:fixed;bottom:80px;right:20px;z-index:199;background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:20px;width:280px;max-height:70vh;overflow-y:auto;display:none;flex-direction:column;gap:10px;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
    .dash-panel.open{display:flex;}
    .dash-panel::-webkit-scrollbar{width:4px;}
    .dash-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:99px;}
    .dash-title{font-size:0.8rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;}
    .dash-sub{font-size:0.65rem;color:var(--muted);margin-bottom:6px;}
    .dash-row{display:flex;align-items:center;gap:8px;font-size:0.75rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .dash-row:last-child{border-bottom:none;}
    .dash-label{flex:1;color:var(--muted);}
    .dash-select{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:0.7rem;padding:4px 8px;font-family:inherit;}
    .dash-check{accent-color:var(--fg);width:14px;height:14px;}
    .dash-btn{background:var(--fg);color:#000;border:none;border-radius:6px;font-size:0.7rem;font-weight:600;padding:4px 12px;cursor:pointer;transition:opacity 0.2s;font-family:inherit;}
    .dash-btn:hover{opacity:0.8;}
    .dash-btn.secondary{background:rgba(255,255,255,0.08);color:var(--fg);}
    .dash-color{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--fg);cursor:pointer;padding:0;}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="enter-screen"><div class="enter-label">Click to Enter</div></div>
<div id="not-found"><h1>404</h1><p>Profile not found.</p><a href="/">← Claim yours</a></div>

<div class="page" id="main-page">
  <div class="card" id="main-card">
    <div class="banner" id="banner-el"><img id="banner-img" src="" alt=""></div>
    <div class="avatar-area">
      <div class="avatar-wrap">
        <img class="avatar" id="avatar-img" src="" alt="">
        <img class="avatar-decoration" id="decoration-img" src="" alt="" style="display:none">
      </div>
      <div class="username" id="display-name">—</div>
      <div class="bio" id="bio-el" style="display:none"></div>
    </div>
    <div class="widgets" id="widgets"></div>
    <div class="page-footer">made with <a href="/">cxt</a></div>
  </div>
</div>

<!-- dashboard toggle & panel -->
<button class="dash-toggle" id="dashToggle">⚙️ customize</button>
<div class="dash-panel" id="dashPanel">
  <div class="dash-title">background</div>
  <div class="dash-sub">choose a vibe</div>
  <div class="dash-row"><span class="dash-label">style</span>
    <select class="dash-select" id="bgStyle">
      <option value="rain">rain</option>
      <option value="stars">stars</option>
      <option value="waves">waves</option>
      <option value="particles">particles</option>
      <option value="none">none</option>
    </select>
  </div>
  <div class="dash-row"><span class="dash-label">color</span>
    <input type="color" class="dash-color" id="bgColor" value="#ffffff">
  </div>
  <div class="dash-row"><span class="dash-label">speed</span>
    <input type="range" min="1" max="10" value="5" style="flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;accent-color:var(--fg);" id="bgSpeed">
  </div>
  <div class="dash-row" style="border-bottom:none;padding-top:8px;gap:12px;">
    <button class="dash-btn secondary" id="resetBgBtn">reset</button>
    <button class="dash-btn" id="saveBgBtn">save</button>
  </div>
  <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
    <div class="dash-title">quick links</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
      <a href="#" class="dash-btn secondary" style="text-decoration:none;font-size:0.6rem;padding:3px 10px;" id="viewProfileLink">view profile</a>
      <button class="dash-btn secondary" style="font-size:0.6rem;padding:3px 10px;" id="refreshProfile">refresh</button>
    </div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous" loop></audio>

<script>
// ── CONFIG ──
const SUPA_URL='https://rpgtoebzburfzgjoavoj.supabase.co';
const SUPA_KEY='sb_publishable__gbq2uFnqfe2aNaqP71smA_4e94Q5a6';
let username = '';
let PROFILE = null;
let bgMode = 'rain';
let bgColor = '#ffffff';
let bgSpeed = 5;
let rainEnabled = true;
let animFrame = null;

// ── CANVAS BACKGROUND ENGINE ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// particles / stars / waves state
let particles = [];
let wavePhase = 0;

function initParticles(n) {
  particles = [];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      life: Math.random() * 100 + 50
    });
  }
}

function drawBg(style, color, speed) {
  ctx.clearRect(0, 0, W, H);
  const alpha = 0.15;
  const spd = speed / 5;
  switch(style) {
    case 'rain': {
      if (!window._drops) {
        window._drops = [];
        for (let i=0; i<Math.floor(W/8); i++) {
          window._drops.push({
            x: Math.random()*W, y: Math.random()*H,
            len: 10+Math.random()*18, spd: 10+Math.random()*12,
            op: 0.05+Math.random()*0.1, w: 0.5+Math.random()*0.6
          });
        }
      }
      const drops = window._drops;
      const ang = 0.22;
      ctx.strokeStyle = color;
      for (const d of drops) {
        ctx.globalAlpha = d.op * 0.6;
        ctx.lineWidth = d.w;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + Math.sin(ang)*d.len, d.y + Math.cos(ang)*d.len);
        ctx.stroke();
        d.y += d.spd * 0.33 * spd;
        d.x += Math.sin(ang) * d.spd * 0.33 * 0.4 * spd;
        if (d.y > H + d.len) { d.y = -d.len; d.x = Math.random() * W; }
      }
      break;
    }
    case 'stars': {
      ctx.fillStyle = color;
      for (let i=0; i<120; i++) {
        const x = (Math.sin(i*1234.5 + Date.now()*0.0001*spd) * 0.5 + 0.5) * W;
        const y = (Math.cos(i*5678.9 + Date.now()*0.00008*spd) * 0.5 + 0.5) * H;
        const r = 0.5 + Math.sin(i + Date.now()*0.002*spd) * 0.5 + 0.5;
        ctx.globalAlpha = 0.2 + Math.sin(i*2 + Date.now()*0.001*spd)*0.1;
        ctx.beginPath();
        ctx.arc(x, y, r*1.2, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'waves': {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.2;
      for (let w=0; w<4; w++) {
        ctx.beginPath();
        for (let x=0; x<W; x+=2) {
          const y = H/2 + Math.sin(x*0.008 + Date.now()*0.0008*spd + w*1.5) * (40 + w*15) + Math.sin(x*0.015 + Date.now()*0.0012*spd + w) * 20;
          if (x===0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      break;
    }
    case 'particles': {
      if (particles.length < 80) initParticles(80);
      ctx.fillStyle = color;
      for (const p of particles) {
        p.x += p.vx * spd;
        p.y += p.vy * spd;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
        ctx.globalAlpha = 0.2 + Math.sin(p.life + Date.now()*0.001)*0.1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (0.5 + Math.sin(Date.now()*0.002 + p.life)*0.5), 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'none':
    default: break;
  }
  ctx.globalAlpha = 1;
  animFrame = requestAnimationFrame(() => drawBg(bgMode, bgColor, bgSpeed));
}

// ── PROFILE LOADING ──
async function loadProfile() {
  if (location.protocol === 'file:') {
    document.getElementById('not-found').classList.add('show');
    document.querySelector('#not-found p').textContent = 'Open via local server or deploy to GitHub Pages (file:// blocks network requests)';
    document.getElementById('enter-screen').style.display = 'none';
    return;
  }
  const path = location.pathname.replace(/\/$/, '').split('/').pop().replace(/\.html$/i, '');
  const known = ['index','dashboard','profile','404','supabase_setup'];
  username = (path && !known.includes(path)) ? path : '';
  if (!username) {
    document.getElementById('not-found').classList.add('show');
    document.getElementById('enter-screen').style.display = 'none';
    document.getElementById('main-page').style.display = 'none';
    return;
  }
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/profiles?username=eq.${encodeURIComponent(username)}&select=*`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error('Server returned '+r.status);
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) { show404(); return; }
    PROFILE = data[0];
    renderProfile(PROFILE);
    fetch(`${SUPA_URL}/rest/v1/rpc/increment_profile_views`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile_username: username })
    }).catch(()=>{});
    // load bg settings from profile
    if (PROFILE.bg_style) bgMode = PROFILE.bg_style;
    if (PROFILE.bg_color) bgColor = PROFILE.bg_color;
    if (PROFILE.bg_speed) bgSpeed = PROFILE.bg_speed;
    document.getElementById('bgStyle').value = bgMode;
    document.getElementById('bgColor').value = bgColor;
    document.getElementById('bgSpeed').value = bgSpeed;
    if (PROFILE.rain === false) bgMode = 'none';
    startBg();
  } catch(e) {
    document.getElementById('not-found').classList.add('show');
    document.querySelector('#not-found p').textContent = 'Error loading profile. '+(e.message||'');
    document.getElementById('enter-screen').style.display = 'none';
    document.getElementById('main-page').style.display = 'none';
    console.error(e);
  }
}

function show404() {
  document.getElementById('not-found').classList.add('show');
  document.getElementById('enter-screen').style.display = 'none';
  document.getElementById('main-page').style.display = 'none';
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── AUDIO ──
let analyser, dataArr, audioCtx;
function initAudio(url) {
  const ael = document.getElementById('audio');
  ael.src = url; ael.volume = 0.3;
  const pfill = document.getElementById('prog-fill');
  const pbg = document.getElementById('prog-bg');
  const tcur = document.getElementById('t-cur');
  const ttot = document.getElementById('t-tot');
  const vol = document.getElementById('vol');
  function fmt(s) { if (!s || isNaN(s)) return '0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
  ael.addEventListener('timeupdate', () => { if (!ael.duration) return; pfill.style.width = (ael.currentTime/ael.duration*100)+'%'; tcur.textContent = fmt(ael.currentTime); });
  ael.addEventListener('loadedmetadata', () => { ttot.textContent = fmt(ael.duration); });
  ael.addEventListener('error', () => { const tn = document.getElementById('track-name'); if(tn) tn.textContent += ' (failed to load)'; });
  if (pbg) pbg.addEventListener('click', e => { if (!ael.duration) return; const r = pbg.getBoundingClientRect(); ael.currentTime = ((e.clientX-r.left)/r.width)*ael.duration; });
  if (vol) vol.addEventListener('input', () => { ael.volume = vol.value/100; });
  const waveEl = document.getElementById('waveform');
  const BARS = 36; const wbars = [];
  for (let i=0; i<BARS; i++) { const b = document.createElement('div'); b.className = 'wbar'; b.style.height = '3px'; waveEl.appendChild(b); wbars.push(b); }
  function animWave() {
    if (analyser && dataArr) {
      analyser.getByteFrequencyData(dataArr);
      for (let i=0; i<BARS; i++) {
        const v = dataArr[Math.floor(i*dataArr.length/BARS)] / 255;
        const h = Math.max(2, v*28);
        wbars[i].style.height = h+'px';
        wbars[i].style.background = `rgba(255,255,255,${0.55+v*0.45})`;
      }
    } else {
      const t = Date.now()/700;
      for (let i=0; i<BARS; i++) {
        const h = 3 + Math.sin(t+i*0.45)*3 + Math.sin(t*1.4+i*0.28)*2;
        wbars[i].style.height = Math.max(2,h)+'px';
        wbars[i].style.background = 'rgba(255,255,255,0.65)';
      }
    }
    requestAnimationFrame(animWave);
  }
  animWave();
  window._startAudio = function() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); const src = audioCtx.createMediaElementSource(ael); analyser = audioCtx.createAnalyser(); analyser.fftSize = 128; dataArr = new Uint8Array(analyser.frequencyBinCount); src.connect(analyser); analyser.connect(audioCtx.destination); } catch(e) { ael.play().catch(()=>{}); return; }
    }
    ael.play().catch(()=>{});
  };
}

// ── ENTER SCREEN & BG START ──
document.getElementById('enter-screen').addEventListener('click', () => {
  document.getElementById('enter-screen').classList.add('fade-out');
  setTimeout(() => { document.getElementById('enter-screen').style.display = 'none'; }, 750);
  document.getElementById('main-page').classList.add('visible');
  document.getElementById('main-card').classList.add('animate-in');
  if (window._startAudio) setTimeout(window._startAudio, 500);
});

function startBg() {
  if (animFrame) cancelAnimationFrame(animFrame);
  drawBg(bgMode, bgColor, bgSpeed);
}

// ── DASHBOARD UI ──
document.getElementById('dashToggle').addEventListener('click', () => {
  document.getElementById('dashPanel').classList.toggle('open');
});
document.getElementById('bgStyle').addEventListener('change', e => {
  bgMode = e.target.value;
  if (bgMode === 'none') rainEnabled = false;
  else rainEnabled = true;
  startBg();
});
document.getElementById('bgColor').addEventListener('input', e => {
  bgColor = e.target.value;
  startBg();
});
document.getElementById('bgSpeed').addEventListener('input', e => {
  bgSpeed = parseInt(e.target.value);
  startBg();
});
document.getElementById('resetBgBtn').addEventListener('click', () => {
  bgMode = 'rain'; bgColor = '#ffffff'; bgSpeed = 5;
  document.getElementById('bgStyle').value = 'rain';
  document.getElementById('bgColor').value = '#ffffff';
  document.getElementById('bgSpeed').value = '5';
  startBg();
});
document.getElementById('saveBgBtn').addEventListener('click', async () => {
  if (!PROFILE || !PROFILE.username) return;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/profiles?username=eq.${PROFILE.username}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ bg_style: bgMode, bg_color: bgColor, bg_speed: bgSpeed, rain: bgMode !== 'none' })
    });
    if (res.ok) { alert('Background settings saved!'); } else { alert('Error saving.'); }
  } catch(e) { alert('Error: '+e.message); }
});
document.getElementById('viewProfileLink').addEventListener('click', (e) => {
  e.preventDefault();
  if (PROFILE) location.href = location.pathname.replace(/\/[^/]*$/, '/') + PROFILE.username;
});
document.getElementById('refreshProfile').addEventListener('click', () => {
  location.reload();
});

// ── INIT ──
loadProfile();
// init particles
initParticles(80);
</script>
